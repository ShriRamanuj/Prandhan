<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>श्रीवैष्णव प्राणधन — YouTube लिंक संग्रह</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif;
    background: #FDF6EE;
    color: #2C1810;
    min-height: 100vh;
  }

  /* ── Image 1: Mandir banner (full width, top) ── */
  .mandir-banner {
    width: 100%;
    background: #8B0000;
    text-align: center;
    padding: 0;
    line-height: 0;
  }
  .mandir-banner img {
    width: 100%;
    max-width: 900px;
    display: block;
    margin: 0 auto;
  }

  /* ── Image 2: Four Acharyas (below mandir) ── */
  .acharya-banner {
    background: #FFF8F0;
    text-align: center;
    padding: 14px 20px 12px;
    border-bottom: 3px solid #FFD180;
  }
  .acharya-banner img {
    max-width: 100%;
    width: 700px;
    border-radius: 8px;
    box-shadow: 0 3px 14px rgba(139,0,0,0.18);
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #6B0000 0%, #8B0000 40%, #B71C1C 100%);
    color: white;
    text-align: center;
    padding: 22px 20px 18px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #FFD700, #FF8F00, #FFD700);
  }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { color: #FFD700; font-size: 12px; margin-top: 5px; }
  .header .badges { margin-top: 10px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,215,0,0.45);
    color: #FFE082;
    font-size: 10.5px;
    padding: 3px 13px;
    border-radius: 20px;
  }

  /* ── Search ── */
  .search-wrap {
    background: white;
    border-bottom: 2px solid #FFD180;
    padding: 13px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .search-wrap input {
    flex: 1;
    padding: 9px 16px;
    border: 1.5px solid #FFB74D;
    border-radius: 25px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    color: #2C1810;
    background: #FFF8F0;
    transition: all 0.2s;
  }
  .search-wrap input:focus { border-color: #8B0000; background: white; box-shadow: 0 0 0 3px rgba(139,0,0,0.08); }
  .search-wrap input::placeholder { color: #bbb; }
  .result-count { font-size: 12px; color: #888; white-space: nowrap; min-width: 80px; text-align: right; }

  /* ── Table ── */
  .table-wrap { padding: 0 16px 30px; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 14px rgba(139,0,0,0.08);
  }
  thead tr { background: linear-gradient(90deg, #7B0000, #8B0000); }
  thead th { color: white; padding: 11px 10px; font-size: 11px; font-weight: 600; }
  tbody tr { border-bottom: 1px solid #FFE0B2; transition: background 0.15s; }
  tbody tr:nth-child(even) { background: #FFF8F0; }
  tbody tr:hover { background: #FFECB3 !important; }
  td { padding: 8px 10px; font-size: 12px; vertical-align: middle; }
  td:first-child {
    text-align: center; font-weight: 700; color: #8B0000;
    font-size: 11.5px; width: 55px;
    background: #FFF3E0; border-right: 1px solid #FFE0B2;
  }
  td:last-child { text-align: center; width: 150px; }
  .yt-links { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .yt-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: #FF0000; color: white !important;
    text-decoration: none !important;
    padding: 5px 10px; border-radius: 5px;
    font-size: 10.5px; font-weight: 600;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 2px 5px rgba(255,0,0,0.2);
  }
  .yt-btn:hover { background: #CC0000; transform: scale(1.05); }
  .yt-btn.v2 { background: #C62828; }
  .yt-btn.v3 { background: #B71C1C; }
  .yt-icon { width: 12px; height: 12px; flex-shrink: 0; }
  .no-results { text-align: center; padding: 50px; color: #aaa; font-size: 14px; }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 16px;
    font-size: 11px; color: #999;
    border-top: 1px solid #FFD180;
    background: white; margin-top: 10px;
  }
  .footer span { color: #8B0000; font-weight: 600; }

  .top-section {
    width: 100%;
    background: #FF6B00;
    text-align: center;
    padding: 0;
    line-height: 0;
  }
  .top-section img.sri-img {
    max-width: 520px;
    width: 100%;
    display: inline-block;
    height: auto;
  }
  .banner-row {
    display: flex;
    align-items: stretch;
    width: 100%;
    border-bottom: 3px solid #FFD180;
  }
  .banner-row .mandir-col {
    flex: 1.1;
    background: #8B0000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    line-height: 0;
  }
  .banner-row .mandir-col img {
    width: 100%; border-radius: 4px; display: block;
  }
  .banner-row .acharya-col {
    flex: 1.4;
    background: #FFF8F0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    line-height: 0;
  }
  .banner-row .acharya-col img {
    width: 100%; border-radius: 4px; display: block;
  }
  @media (max-width: 600px) {
    .banner-row { flex-direction: column; }
  }
</style>
</head>

const YT_ICON = `<svg class="yt-icon" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>`;
const SHADE = ['', 'v2', 'v3'];

function renderAll(data) {
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  if (data.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
  } else {
    noRes.style.display = 'none';
    tbody.innerHTML = data.map(r => {
      let linksHtml = '—';
      if (r.u && r.u.length > 0) {
        linksHtml = `<div class="yt-links">${r.u.map((url, i) =>
          `<a class="yt-btn ${SHADE[i] || 'v3'}" href="${url}" target="_blank">${YT_ICON} ${r.u.length > 1 ? 'YouTube Link '+(i+1) : 'YouTube Link'}</a>`
        ).join('')}</div>`;
      }
      return `<tr><td>${r.p}</td><td>${r.t}</td><td>${linksHtml}</td></tr>`;
    }).join('');
  }
  document.getElementById('resultCount').textContent = data.length + ' मिले';
}

function filterTable() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  if (!q) { renderAll(DATA); return; }
  const filtered = DATA.filter(r => r.t.toLowerCase().includes(q) || r.p.includes(q));
  renderAll(filtered);
}

renderAll(DATA);
</script>
